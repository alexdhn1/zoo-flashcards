<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoo Board Flashcards 🦎</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦎</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #fafaf9 0%, #f0ebe3 50%, #e7e0d5 100%);
      font-family: 'EB Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes cardIn { from{opacity:0;transform:scale(0.95) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .fade-up { animation:fadeUp 0.5s ease-out both; }
    .card-in { animation:cardIn 0.4s cubic-bezier(0.4,0,0.2,1) both; }
    .paste-area { width:100%; min-height:220px; border-radius:16px; border:2px solid #d6cfc7; background:#fffffe; padding:20px; font-family:'DM Mono',monospace; font-size:13px; line-height:1.7; color:#44403c; resize:vertical; outline:none; transition:border-color 0.2s; }
    .paste-area:focus { border-color:#a8a29e; }
    .paste-area::placeholder { color:#c4beb6; }
    .btn { font-family:'DM Mono',monospace; font-size:12px; padding:8px 16px; border-radius:10px; border:1px solid #d6cfc7; background:transparent; color:#78716c; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .btn:hover { background:#f5f0eb; }
    .btn-primary { font-family:'Outfit',sans-serif; font-weight:500; font-size:14px; padding:10px 28px; border-radius:10px; border:none; background:linear-gradient(135deg,#292524 0%,#44403c 100%); color:#fafaf9; cursor:pointer; box-shadow:0 4px 16px rgba(41,37,36,0.2); transition:all 0.2s; }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(41,37,36,0.25); }
    .btn-primary:disabled { background:#d6d3d1; color:#a8a29e; cursor:not-allowed; box-shadow:none; transform:none; }
    .btn-nav { font-family:'DM Mono',monospace; font-size:13px; padding:10px 24px; border-radius:12px; border:1px solid #e2e8f0; background:#ffffff; color:#475569; cursor:pointer; transition:all 0.2s; }
    .btn-nav:hover:not(:disabled) { background:#f8fafc; transform:translateY(-1px); }
    .btn-nav:disabled { background:#f8fafc; color:#cbd5e1; cursor:not-allowed; }
    .btn-danger { font-family:'DM Mono',monospace; font-size:11px; padding:5px 12px; border-radius:8px; border:1px solid #fecaca; background:#fef2f2; color:#dc2626; cursor:pointer; transition:all 0.2s; }
    .btn-danger:hover { background:#fee2e2; border-color:#f87171; }
    .btn-google { font-family:'Outfit',sans-serif; font-weight:500; font-size:15px; padding:14px 32px; border-radius:14px; border:2px solid #e2e0db; background:#fffffe; color:#292524; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .btn-google:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.1); border-color:#d6cfc7; }
    .flip-container { perspective:1200px; width:100%; max-width:620px; margin:0 auto; }
    .flip-card { position:relative; width:100%; min-height:340px; cursor:pointer; transform-style:preserve-3d; transition:transform 0.6s cubic-bezier(0.4,0,0.2,1); }
    .flip-card.flipped { transform:rotateY(180deg); }
    .flip-face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:20px; padding:32px 28px 24px; display:flex; flex-direction:column; }
    .flip-back { transform:rotateY(180deg); }
    .dot { height:10px; border-radius:5px; border:none; cursor:pointer; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); padding:0; }
    .kbd { background:#f5f0eb; padding:3px 8px; border-radius:4px; margin:0 4px; font-family:'DM Mono',monospace; font-size:11px; }
    .filter-chip { font-family:'DM Mono',monospace; font-size:11px; padding:5px 12px; border-radius:20px; border:1.5px solid; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .filter-chip:hover { transform:translateY(-1px); }
    .filter-chip.inactive { opacity:0.35; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:#292524; color:#fafaf9; font-family:'DM Mono',monospace; font-size:12px; padding:10px 20px; border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,0.2); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); z-index:1000; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .modal-overlay { position:fixed; inset:0; background:rgba(41,37,36,0.4); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:999; }
    .modal { background:#fffffe; border-radius:20px; padding:28px; max-width:400px; width:90%; box-shadow:0 16px 48px rgba(0,0,0,0.15); }
    .spinner { width:24px; height:24px; border:3px solid #e2e0db; border-top-color:#292524; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
    .sync-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-left:6px; }
    .sync-dot.ok { background:#10b981; }
    .sync-dot.saving { background:#f59e0b; animation:spin 1s linear infinite; }
    .sync-dot.error { background:#ef4444; }
    @media (max-width:640px) { .flip-face{padding:24px 20px 20px;} .flip-card{min-height:300px;} }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase SDK (compat pour simplicité dans un single-file) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef, useMemo } = React;

    /* ══════════════════════════════════════════════
       FIREBASE CONFIG
       ══════════════════════════════════════════════ */
    const firebaseConfig = {
      apiKey: "AIzaSyCBG9Wtc3ZdLoImpEa8zkzr1lnMwuPDiyA",
      authDomain: "zoo-flashcards.firebaseapp.com",
      projectId: "zoo-flashcards",
      storageBucket: "zoo-flashcards.firebasestorage.app",
      messagingSenderId: "96716412956",
      appId: "1:96716412956:web:ea68f2bb4f0fa6efdbe7d9"
    };

    // ═══ Whitelist — seuls ces emails peuvent se connecter ═══
    const ALLOWED_EMAILS = [
      "alexdhn1@gmail.com",
      "student.music.network.venues@gmail.com",
    ];

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    /* ══════════════════════════════════════════════
       FIRESTORE HELPERS
       ══════════════════════════════════════════════ */
    // Chaque user a sa collection : /users/{uid}/cards/{cardId}
    function userCardsRef(uid) {
      return db.collection('users').doc(uid).collection('cards');
    }

    async function loadCardsFromFirestore(uid) {
      const snap = await userCardsRef(uid).orderBy('addedAt','asc').get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    async function addCardsToFirestore(uid, cards) {
      const batch = db.batch();
      cards.forEach(card => {
        const ref = userCardsRef(uid).doc(card.id);
        batch.set(ref, card);
      });
      await batch.commit();
    }

    async function deleteCardFromFirestore(uid, cardId) {
      await userCardsRef(uid).doc(cardId).delete();
    }

    async function clearAllCardsFirestore(uid) {
      const snap = await userCardsRef(uid).get();
      const batch = db.batch();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
    }

    /* ══════════════════════════════════════════════
       PARSER
       ══════════════════════════════════════════════ */
    function parseFlashcards(text) {
      const cards = [];
      const blocks = text.split(/(?=FLASHCARD\s*\d+)/i).filter(b=>b.trim());
      for (const block of blocks) {
        const cleaned = block.replace(/^---+\s*/gm,'').replace(/^FLASHCARD\s*\d+\s*/i,'').trim();
        if (!cleaned) continue;
        let question='',answer='',category='',species='';
        const qM=cleaned.match(/^Q\s*[:：]\s*([\s\S]*?)(?=\n?\s*[RA]\s*[:：])/im);
        if(qM) question=qM[1].replace(/\s+/g,' ').trim();
        const aM=cleaned.match(/^[RA]\s*[:：]\s*([\s\S]*?)(?=\n?\s*Cat[ée]gor|$)/im);
        if(aM) answer=aM[1].replace(/\s+/g,' ').trim();
        const cM=cleaned.match(/Cat[ée]gor[yi]e?\s*[:：]\s*(.+)/i);
        if(cM) category=cM[1].trim();
        const sM=cleaned.match(/(Species|Esp[èe]ce)\s*[:：]\s*(.+)/i);
        if(sM) species=sM[2].trim();
        if(category) category=category.replace(/(Species|Esp[èe]ce)\s*[:：].*/i,'').trim();
        if(answer){ answer=answer.replace(/Cat[ée]gor[yi]e?\s*[:：].*/i,'').trim(); answer=answer.replace(/(Species|Esp[èe]ce)\s*[:：].*/i,'').trim(); }
        if(question&&answer) cards.push({
          id: Date.now().toString(36)+Math.random().toString(36).slice(2,7),
          question:question.trim(), answer:answer.trim(), category, species,
          addedAt: new Date().toISOString()
        });
      }
      return cards;
    }

    /* ══════════════════════════════════════════════
       CATEGORIES
       ══════════════════════════════════════════════ */
    const catIcons={'1':'🔍','2':'💊','3':'📈','4':'🛡️','5':'😴','6':'🧬','7':'🩺','8':'✂️'};
    const catColors={
      '1':{bg:'#fef3c7',border:'#f59e0b',text:'#92400e'},'2':{bg:'#dbeafe',border:'#3b82f6',text:'#1e3a5f'},
      '3':{bg:'#d1fae5',border:'#10b981',text:'#064e3b'},'4':{bg:'#ede9fe',border:'#8b5cf6',text:'#4c1d95'},
      '5':{bg:'#fce7f3',border:'#ec4899',text:'#831843'},'6':{bg:'#ffedd5',border:'#f97316',text:'#7c2d12'},
      '7':{bg:'#e0f2fe',border:'#0ea5e9',text:'#0c4a6e'},'8':{bg:'#fde2e2',border:'#ef4444',text:'#7f1d1d'},
    };
    const catNames={'1':'Diagnosis','2':'Therapeutics','3':'Prognosis','4':'Prevention','5':'Anesthesia','6':'Species specifics','7':'Diagnostic proc.','8':'Therapeutic proc.'};
    const getCN=c=>{for(const k of Object.keys(catIcons))if(c.includes(k))return k;return '0';};
    const getCI=c=>catIcons[getCN(c)]||'📋';
    const getCC=c=>catColors[getCN(c)]||{bg:'#f3f4f6',border:'#9ca3af',text:'#374151'};

    /* ══════════════════════════════════════════════
       EXPORT JSON
       ══════════════════════════════════════════════ */
    const exportJSON = cards => {
      const b=new Blob([JSON.stringify(cards,null,2)],{type:'application/json'});
      const u=URL.createObjectURL(b); const a=document.createElement('a');
      a.href=u; a.download=`zoo-flashcards-${new Date().toISOString().slice(0,10)}.json`; a.click();
      URL.revokeObjectURL(u);
    };

    /* ══════════════════════════════════════════════
       COMPONENTS
       ══════════════════════════════════════════════ */
    function Toast({message,visible}){ return <div className={`toast ${visible?'show':''}`}>{message}</div>; }

    function ConfirmModal({message,onConfirm,onCancel}){
      return(<div className="modal-overlay" onClick={onCancel}><div className="modal" onClick={e=>e.stopPropagation()}>
        <p style={{fontFamily:"'EB Garamond',serif",fontSize:17,color:'#292524',marginBottom:20,lineHeight:1.5}}>{message}</p>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button className="btn" onClick={onCancel}>Cancel</button>
          <button className="btn-danger" style={{padding:'8px 18px',fontSize:12}} onClick={onConfirm}>Delete</button>
        </div>
      </div></div>);
    }

    function CategoryFilters({allCards,activeFilters,onToggle}){
      const cats=useMemo(()=>{
        const m={};
        allCards.forEach(c=>{const n=getCN(c.category);if(!m[n])m[n]={count:0};m[n].count++;});
        return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
      },[allCards]);
      return(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
          {cats.map(([num,{count}])=>{
            const col=catColors[num]||{bg:'#f3f4f6',border:'#9ca3af',text:'#374151'};
            const active=activeFilters.includes(num);
            return(<button key={num} className={`filter-chip ${active?'':'inactive'}`} onClick={()=>onToggle(num)}
              style={{borderColor:col.border,background:active?col.bg:'transparent',color:col.text}}>
              {catIcons[num]||'📋'} {catNames[num]||`Cat ${num}`} ({count})
            </button>);
          })}
        </div>
      );
    }

    function FlashCard({card,index,total,onNext,onPrev,onFlip,flipped,onDelete}){
      const c=getCC(card.category), icon=getCI(card.category);
      return(
        <div className="flip-container card-in" key={card.id}>
          <div className={`flip-card ${flipped?'flipped':''}`} onClick={onFlip}>
            <div className="flip-face" style={{border:`2px solid ${c.border}`,background:`linear-gradient(135deg,#fff 0%,${c.bg} 100%)`,boxShadow:`0 8px 32px ${c.border}33,0 2px 8px rgba(0,0,0,0.06)`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:1.5,textTransform:'uppercase',color:c.text,opacity:0.7}}>{icon} {card.category}</span>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'#94a3b8',background:'#f1f5f9',padding:'3px 10px',borderRadius:20}}>{index+1} / {total}</span>
              </div>
              {card.species&&<div style={{fontFamily:"'EB Garamond',serif",fontSize:13,fontStyle:'italic',color:c.text,opacity:0.6,marginBottom:16}}>{card.species}</div>}
              <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <p style={{fontFamily:"'EB Garamond',serif",fontSize:19,lineHeight:1.55,color:'#1e293b',textAlign:'center'}}>{card.question}</p>
              </div>
              <div style={{textAlign:'center',fontFamily:"'DM Mono',monospace",fontSize:11,color:'#94a3b8',marginTop:12}}>tap to reveal answer</div>
            </div>
            <div className="flip-face flip-back" style={{border:`2px solid ${c.border}`,background:`linear-gradient(135deg,${c.bg} 0%,#fff 100%)`,boxShadow:`0 8px 32px ${c.border}33,0 2px 8px rgba(0,0,0,0.06)`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:1.5,textTransform:'uppercase',color:c.text,background:`${c.border}22`,padding:'4px 12px',borderRadius:20}}>Answer</span>
                <button className="btn-danger" onClick={e=>{e.stopPropagation();onDelete(card.id);}} title="Delete this card">🗑</button>
              </div>
              <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <p style={{fontFamily:"'EB Garamond',serif",fontSize:18,lineHeight:1.6,color:c.text,textAlign:'center'}}>{card.answer}</p>
              </div>
              <div style={{textAlign:'center',fontFamily:"'DM Mono',monospace",fontSize:11,color:'#94a3b8',marginTop:12}}>tap to see question</div>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:24}}>
            <button className="btn-nav" onClick={e=>{e.stopPropagation();onPrev();}} disabled={index===0}>← prev</button>
            <button className="btn-nav" onClick={e=>{e.stopPropagation();onNext();}} disabled={index===total-1}>next →</button>
          </div>
        </div>
      );
    }

    function ProgressDots({cards,currentIndex,onJump}){
      return(<div style={{display:'flex',gap:6,justifyContent:'center',flexWrap:'wrap',maxWidth:500,margin:'0 auto'}}>
        {cards.map((card,i)=>{const c=getCC(card.category);return(
          <button key={card.id} className="dot" onClick={()=>onJump(i)} title={`Card ${i+1}`}
            style={{width:i===currentIndex?28:10,background:i===currentIndex?c.border:`${c.border}44`}}/>
        );})}
      </div>);
    }

    /* ══════════════════════════════════════════════
       LOGIN SCREEN
       ══════════════════════════════════════════════ */
    function LoginScreen({ onLogin, error, loading }) {
      return (
        <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 20px'}}>
          <div className="fade-up" style={{textAlign:'center',maxWidth:400}}>
            <div style={{fontSize:64,marginBottom:16}}>🦎</div>
            <h1 style={{fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:32,color:'#292524',marginBottom:8,letterSpacing:-0.5}}>
              Zoo Board Flashcards
            </h1>
            <p style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:'#78716c',letterSpacing:0.5,marginBottom:36}}>
              European Board of Veterinary Zoological Medicine
            </p>

            {loading ? (
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12}}>
                <span className="spinner"></span>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:'#78716c'}}>Signing in...</span>
              </div>
            ) : (
              <button className="btn-google" onClick={onLogin}>
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in with Google
              </button>
            )}

            {error && (
              <div style={{marginTop:20,padding:'12px 16px',borderRadius:10,background:'#fef2f2',border:'1px solid #fecaca',color:'#991b1b',fontFamily:"'DM Mono',monospace",fontSize:12,textAlign:'center'}}>
                {error}
              </div>
            )}

            <p style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'#a8a29e',marginTop:32}}>
              Access restricted to authorized accounts only
            </p>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       MAIN APP
       ══════════════════════════════════════════════ */
    function App() {
      // Auth state
      const [user, setUser] = useState(null);       // firebase user object
      const [authLoading, setAuthLoading] = useState(true); // initial auth check
      const [loginLoading, setLoginLoading] = useState(false);
      const [authError, setAuthError] = useState('');

      // App state
      const [allCards,setAllCards]=useState([]);
      const [view,setView]=useState('input');
      const [rawText,setRawText]=useState('');
      const [idx,setIdx]=useState(0);
      const [flipped,setFlipped]=useState(false);
      const [shuffleOrder,setShuffleOrder]=useState(null);
      const [parseError,setParseError]=useState('');
      const [toast,setToast]=useState({message:'',visible:false});
      const [confirmDel,setConfirmDel]=useState(null);
      const [activeFilters,setActiveFilters]=useState([]);
      const [syncStatus,setSyncStatus]=useState('ok'); // ok | saving | error
      const [dataLoaded,setDataLoaded]=useState(false);
      const fileRef=useRef(null);

      const showToast=msg=>{setToast({message:msg,visible:true});setTimeout(()=>setToast(t=>({...t,visible:false})),2500);};

      // ── Auth listener ──
      useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => {
          if (u && ALLOWED_EMAILS.includes(u.email?.toLowerCase())) {
            setUser(u);
          } else if (u) {
            // Connecté mais pas dans la whitelist → sign out
            auth.signOut();
            setUser(null);
            setAuthError(`Access denied for ${u.email}. This app is restricted.`);
          } else {
            setUser(null);
          }
          setAuthLoading(false);
        });
        return () => unsub();
      }, []);

      // ── Charger les cartes depuis Firestore quand le user se connecte ──
      useEffect(() => {
        if (!user) { setAllCards([]); setDataLoaded(false); return; }
        setDataLoaded(false);
        loadCardsFromFirestore(user.uid)
          .then(cards => {
            setAllCards(cards);
            setDataLoaded(true);
            if (cards.length > 0) setView('cards');
          })
          .catch(err => {
            console.error('Firestore load error:', err);
            setSyncStatus('error');
            setDataLoaded(true);
          });
      }, [user]);

      // ── Init filtres quand les cartes changent ──
      useEffect(() => {
        const cats=[...new Set(allCards.map(c=>getCN(c.category)))];
        setActiveFilters(prev => {
          if(prev.length===0) return cats;
          return [...new Set([...prev,...cats])];
        });
      }, [allCards.length]);

      // ── Cartes filtrées ──
      const filteredCards=useMemo(()=>{
        let fc=allCards.filter(c=>activeFilters.includes(getCN(c.category)));
        if(shuffleOrder){
          const order=new Map(shuffleOrder.map((id,i)=>[id,i]));
          fc=[...fc].sort((a,b)=>(order.get(a.id)??999)-(order.get(b.id)??999));
        }
        return fc;
      },[allCards,activeFilters,shuffleOrder]);

      // ── Login ──
      const handleLogin = useCallback(async () => {
        setLoginLoading(true);
        setAuthError('');
        try {
          await auth.signInWithPopup(googleProvider);
        } catch (err) {
          console.error('Login error:', err);
          setAuthError('Sign-in failed. Please try again.');
        }
        setLoginLoading(false);
      }, []);

      // ── Logout ──
      const handleLogout = useCallback(async () => {
        await auth.signOut();
        setAllCards([]);
        setView('input');
        setActiveFilters([]);
      }, []);

      // ── Ajouter des cartes ──
      const handleParse = useCallback(async () => {
        setParseError('');
        const parsed = parseFlashcards(rawText);
        if (parsed.length > 0) {
          setSyncStatus('saving');
          try {
            await addCardsToFirestore(user.uid, parsed);
            setAllCards(prev => [...prev, ...parsed]);
            setIdx(0); setFlipped(false); setRawText(''); setView('cards'); setShuffleOrder(null);
            setSyncStatus('ok');
            showToast(`✅ ${parsed.length} cards added — synced to cloud`);
          } catch(err) {
            console.error('Firestore save error:', err);
            setSyncStatus('error');
            showToast('❌ Failed to save to cloud');
          }
        } else {
          setParseError('No flashcards detected. Each card needs "FLASHCARD N" with Q: and A: (or R:) fields.');
        }
      }, [rawText, user]);

      // ── Supprimer une carte ──
      const handleDelete = useCallback(id => setConfirmDel(id), []);
      const doDelete = useCallback(async () => {
        setSyncStatus('saving');
        try {
          await deleteCardFromFirestore(user.uid, confirmDel);
          setAllCards(prev => prev.filter(c => c.id !== confirmDel));
          setConfirmDel(null); setFlipped(false);
          setIdx(i => { const n=filteredCards.filter(c=>c.id!==confirmDel).length; return i>=n?Math.max(0,n-1):i; });
          setSyncStatus('ok');
          showToast('🗑 Card deleted');
        } catch(err) {
          console.error('Delete error:', err);
          setSyncStatus('error');
          showToast('❌ Failed to delete');
          setConfirmDel(null);
        }
      }, [confirmDel, user, filteredCards]);

      // ── Clear all ──
      const handleClearAll = useCallback(async () => {
        setSyncStatus('saving');
        try {
          await clearAllCardsFirestore(user.uid);
          setAllCards([]); setActiveFilters([]); setIdx(0); setView('input'); setShuffleOrder(null);
          setSyncStatus('ok');
          showToast('🗑 All cards cleared');
        } catch(err) {
          setSyncStatus('error');
          showToast('❌ Failed to clear');
        }
      }, [user]);

      // ── Shuffle ──
      const handleShuffle = useCallback(() => {
        const ids = filteredCards.map(c=>c.id).sort(()=>Math.random()-0.5);
        setShuffleOrder(ids); setIdx(0); setFlipped(false);
      }, [filteredCards]);

      // ── Toggle filtre ──
      const toggleFilter = useCallback(num => {
        setActiveFilters(prev => {
          const next=prev.includes(num)?prev.filter(c=>c!==num):[...prev,num];
          return next.length===0?prev:next;
        });
        setIdx(0); setFlipped(false);
      }, []);

      // ── Import JSON ──
      const handleImport = useCallback(async (e) => {
        const file=e.target.files[0]; if(!file)return;
        const reader=new FileReader();
        reader.onload=async(ev)=>{
          try{
            const imp=JSON.parse(ev.target.result);
            if(Array.isArray(imp)&&imp.length>0){
              const wi=imp.map(c=>({...c,id:c.id||Date.now().toString(36)+Math.random().toString(36).slice(2,7),addedAt:c.addedAt||new Date().toISOString()}));
              setSyncStatus('saving');
              await addCardsToFirestore(user.uid, wi);
              setAllCards(prev=>[...prev,...wi]);
              setView('cards');
              setSyncStatus('ok');
              showToast(`📥 ${wi.length} cards imported & synced`);
            }
          }catch(err){showToast('❌ Invalid JSON file');}
        };
        reader.readAsText(file); e.target.value='';
      }, [user]);

      // ── Raccourcis clavier ──
      useEffect(()=>{
        if(view!=='cards')return;
        const h=e=>{
          if(e.key==='ArrowRight'||e.key==='d'){setIdx(i=>Math.min(i+1,filteredCards.length-1));setFlipped(false);}
          else if(e.key==='ArrowLeft'||e.key==='a'){setIdx(i=>Math.max(i-1,0));setFlipped(false);}
          else if(e.key===' '||e.key==='Enter'){e.preventDefault();setFlipped(f=>!f);}
        };
        window.addEventListener('keydown',h);
        return()=>window.removeEventListener('keydown',h);
      },[view,filteredCards.length]);

      /* ── LOADING ── */
      if (authLoading) {
        return (
          <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{textAlign:'center'}}>
              <span className="spinner" style={{width:36,height:36,borderWidth:4}}></span>
              <p style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:'#78716c',marginTop:16}}>Loading...</p>
            </div>
          </div>
        );
      }

      /* ── LOGIN ── */
      if (!user) {
        return <LoginScreen onLogin={handleLogin} error={authError} loading={loginLoading} />;
      }

      /* ── LOADING DATA ── */
      if (!dataLoaded) {
        return (
          <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{textAlign:'center'}}>
              <span className="spinner" style={{width:36,height:36,borderWidth:4}}></span>
              <p style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:'#78716c',marginTop:16}}>Loading your cards...</p>
            </div>
          </div>
        );
      }

      // ── Header bar (présent sur toutes les vues) ──
      const headerBar = (
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',marginBottom:8,borderBottom:'1px solid #e7e0d5'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <img src={user.photoURL} alt="" style={{width:28,height:28,borderRadius:'50%',border:'2px solid #e2e0db'}} referrerPolicy="no-referrer"/>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'#78716c'}}>{user.displayName?.split(' ')[0]}</span>
            <span className={`sync-dot ${syncStatus}`} title={syncStatus==='ok'?'Synced':syncStatus==='saving'?'Saving...':'Sync error'}></span>
          </div>
          <button className="btn" style={{fontSize:11,padding:'5px 12px'}} onClick={handleLogout}>sign out</button>
        </div>
      );

      /* ── INPUT VIEW ── */
      if(view==='input'){
        return(
          <div style={{padding:'24px 20px',maxWidth:640,margin:'0 auto'}}>
            {headerBar}
            <div className="fade-up" style={{textAlign:'center',marginBottom:32,marginTop:16}}>
              <div style={{fontSize:48,marginBottom:12}}>🦎</div>
              <h1 style={{fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:26,color:'#292524',marginBottom:8,letterSpacing:-0.5}}>Zoo Board Flashcards</h1>
              <p style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:'#78716c',letterSpacing:0.5}}>
                {allCards.length>0?`${allCards.length} cards in your deck — paste more below`:'Paste your Claude output to create your deck'}
              </p>
              {allCards.length>0&&<button className="btn" style={{marginTop:12}} onClick={()=>setView('cards')}>← back to deck</button>}
            </div>
            <div className="fade-up" style={{animationDelay:'0.1s'}}>
              <textarea className="paste-area" value={rawText} onChange={e=>setRawText(e.target.value)}
                placeholder={`Paste flashcards output from Claude here...\n\nFLASHCARD 1\nQ: Your question...\nR: Your answer...\nCategory: 1 — Diagnosis\nSpecies: ...`}/>
            </div>
            <div className="fade-up" style={{display:'flex',gap:10,marginTop:20,justifyContent:'center',flexWrap:'wrap',animationDelay:'0.2s'}}>
              <button className="btn-primary" onClick={handleParse} disabled={!rawText.trim()||syncStatus==='saving'}>
                {syncStatus==='saving'?'Saving...':allCards.length>0?'Add to deck →':'Generate cards →'}
              </button>
            </div>
            {parseError&&<div style={{marginTop:16,padding:'12px 16px',borderRadius:10,background:'#fef2f2',border:'1px solid #fecaca',color:'#991b1b',fontFamily:"'DM Mono',monospace",fontSize:12,textAlign:'center'}}>⚠️ {parseError}</div>}
            <div className="fade-up" style={{display:'flex',gap:10,marginTop:24,justifyContent:'center',flexWrap:'wrap',animationDelay:'0.3s'}}>
              <button className="btn" onClick={()=>fileRef.current?.click()}>📥 import JSON</button>
              <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImport}/>
              {allCards.length>0&&<>
                <button className="btn" onClick={()=>exportJSON(allCards)}>📤 export ({allCards.length})</button>
                <button className="btn-danger" style={{padding:'8px 16px'}} onClick={handleClearAll}>🗑 clear all</button>
              </>}
            </div>
            <Toast message={toast.message} visible={toast.visible}/>
          </div>
        );
      }

      /* ── CARDS VIEW ── */
      const card=filteredCards[idx];
      return(
        <div style={{padding:'24px 20px',maxWidth:680,margin:'0 auto'}}>
          {headerBar}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,marginTop:8,flexWrap:'wrap',gap:8}}>
            <button className="btn" onClick={()=>setView('input')}>+ add cards</button>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:18}}>🦎</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'#78716c'}}>{filteredCards.length} / {allCards.length} cards</span>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn" onClick={()=>exportJSON(allCards)} title="Export JSON">📤</button>
              <button className="btn" onClick={handleShuffle} title="Shuffle">🔀</button>
            </div>
          </div>

          <div style={{marginBottom:20}}>
            <CategoryFilters allCards={allCards} activeFilters={activeFilters} onToggle={toggleFilter}/>
          </div>

          {filteredCards.length===0?(
            <div style={{textAlign:'center',padding:'60px 20px',color:'#78716c',fontFamily:"'DM Mono',monospace",fontSize:13}}>No cards match the selected filters</div>
          ):(
            <>
              <div style={{marginBottom:24}}><ProgressDots cards={filteredCards} currentIndex={idx} onJump={i=>{setIdx(i);setFlipped(false);}}/></div>
              {card&&<FlashCard card={card} index={idx} total={filteredCards.length} flipped={flipped}
                onFlip={()=>setFlipped(f=>!f)}
                onNext={()=>{setIdx(i=>Math.min(i+1,filteredCards.length-1));setFlipped(false);}}
                onPrev={()=>{setIdx(i=>Math.max(i-1,0));setFlipped(false);}}
                onDelete={handleDelete}/>}
              <div style={{textAlign:'center',marginTop:32,fontFamily:"'DM Mono',monospace",fontSize:11,color:'#a8a29e'}}>
                <span className="kbd">← →</span> navigate <span style={{margin:'0 12px'}}>·</span> <span className="kbd">space</span> flip
              </div>
            </>
          )}

          {confirmDel&&<ConfirmModal message="Delete this flashcard? This cannot be undone." onConfirm={doDelete} onCancel={()=>setConfirmDel(null)}/>}
          <Toast message={toast.message} visible={toast.visible}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
